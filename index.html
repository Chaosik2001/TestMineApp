<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frog Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --accent: #27ae60;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Верхняя часть с балансом */
        .header {
            text-align: center;
            margin-top: 10px;
            flex: 0;
        }

        #score {
            font-size: 48px;
            font-weight: 900;
            margin: 0;
            color: var(--text);
        }

        .hint {
            color: var(--hint);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Центральная часть с кнопкой */
        .main-game {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .coin-wrapper {
            position: relative;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .coin-wrapper:active { transform: scale(0.95); }

        .coin img {
            width: 240px; /* Размер кнопки */
            height: auto;
            display: block;
        }

        /* Нижняя часть со статой */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px; /* Отступ от системной кнопки */
        }

        .stat-card {
            background-color: var(--sec-bg);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .stat-label {
            display: block;
            color: var(--hint);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Анимация +0.01 */
        .plus-one {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            font-size: 26px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <p id="score">0.00000</p>
        <span class="hint">Твой баланс</span>
    </div>

    <div class="main-game">
        <div class="coin-wrapper" id="clicker">
            <div class="coin">
                <img src="button.png" alt="Frog Button">
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <span class="stat-label">Кликов</span>
            <span class="stat-value" id="clicks-count">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Добыто (сессия)</span>
            <span class="stat-value" id="session-mined">0.00</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const clicker = document.getElementById('clicker');
        const scoreDisplay = document.getElementById('score');
        const clicksDisplay = document.getElementById('clicks-count');
        const sessionDisplay = document.getElementById('session-mined');

        const urlParams = new URLSearchParams(window.location.search);
        let initialValue = parseFloat(urlParams.get('balance')) || 0.00000;
        let currentScore = initialValue;
        let clicks = 0;

        // Инициализация
        scoreDisplay.innerText = currentScore.toFixed(5);

        tg.expand();
        tg.ready();

        clicker.addEventListener('click', (e) => {
            // Математика
            currentScore += 0.01;
            clicks++;
            let sessionMined = currentScore - initialValue;

            // Обновление экрана
            scoreDisplay.innerText = currentScore.toFixed(5);
            clicksDisplay.innerText = clicks;
            sessionDisplay.innerText = sessionMined.toFixed(2);

            tg.HapticFeedback.impactOccurred('light');

            // Эффект вылета
            const plus = document.createElement('div');
            plus.innerText = '+0.01';
            plus.className = 'plus-one';
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            plus.style.left = x - 25 + 'px';
            plus.style.top = y - 30 + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        });

        tg.MainButton.setText("СОХРАНИТЬ ПРОГРЕСС");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({
                diff: (currentScore - initialValue).toFixed(5),
                total: currentScore.toFixed(5),
                clicks: clicks
            }));
            tg.close();
        });
    </script>
</body>
</html>
