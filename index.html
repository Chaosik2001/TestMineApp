<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frog Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container { text-align: center; }

        #score {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums; /* Чтобы цифры не прыгали */
        }

        .hint {
            color: var(--hint);
            margin-bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .coin-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coin-wrapper:active {
            transform: scale(0.9);
        }

        .coin {
            width: 250px;
            height: 250px;
        }

        .coin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .plus-one {
            position: absolute;
            color: #27ae60;
            font-weight: bold;
            font-size: 28px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="score">0.00000</div>
        <div class="hint">баланс монет</div>
        
        <div class="coin-wrapper" id="clicker">
            <div class="coin">
                <img src="button.png" alt="Mining Button">
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const clicker = document.getElementById('clicker');
        const scoreDisplay = document.getElementById('score');

        // Логика получения баланса из URL параметров
        const urlParams = new URLSearchParams(window.location.search);
        let initialValue = parseFloat(urlParams.get('balance')) || 0.00000;
        let currentScore = initialValue;

        // Устанавливаем начальный текст
        scoreDisplay.innerText = currentScore.toFixed(5);

        tg.expand();
        tg.ready();

        clicker.addEventListener('click', (e) => {
            // Прибавляем строго 0.01
            currentScore += 0.01;
            scoreDisplay.innerText = currentScore.toFixed(5);

            tg.HapticFeedback.impactOccurred('light');

            // Анимация +0.01
            const plus = document.createElement('div');
            plus.innerText = '+0.01';
            plus.className = 'plus-one';
            
            // Определяем координаты клика (мышь или тач)
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            plus.style.left = x - 25 + 'px';
            plus.style.top = y - 30 + 'px';
            
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        });

        // Настройка главной кнопки Telegram
        tg.MainButton.setText("СОХРАНИТЬ ПРОГРЕСС");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            // Считаем, сколько именно намайнили (разница)
            const minedAmount = currentScore - initialValue;
            
            // Отправляем объект с данными боту
            tg.sendData(JSON.stringify({
                diff: minedAmount.toFixed(5),
                total: currentScore.toFixed(5)
            }));
            tg.close();
        });
    </script>
</body>
</html>
