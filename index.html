<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frog Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --accent: #27ae60;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header { text-align: center; margin-top: 10px; flex: 0; }
        #score { font-size: 46px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .hint-main { color: var(--hint); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }

        .main-game {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .coin-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .coin-wrapper:active { transform: scale(0.92); }

        .coin img {
            width: 230px;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* Сетка статистики */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 колонки */
            gap: 10px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--sec-bg);
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.04);
        }

        /* Широкая плашка вниз */
        .stat-card.wide {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
        }

        .stat-label {
            display: block;
            color: var(--hint);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
        }

        .plus-one {
            position: absolute;
            color: var(--accent);
            font-weight: bold;
            font-size: 26px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <p id="score">0.00000</p>
        <span class="hint-main">Баланс монет</span>
    </div>

    <div class="main-game">
        <div class="coin-wrapper" id="clicker">
            <div class="coin">
                <img src="button.png" alt="Frog Button">
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <span class="stat-label">Клики</span>
            <span class="stat-value" id="clicks-count">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Скорость</span>
            <span class="stat-value" id="cps-value">0.0</span>
        </div>
        
        <div class="stat-card wide">
            <span class="stat-label">За сессию</span>
            <span class="stat-value" id="session-mined">0.00</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const clicker = document.getElementById('clicker');
        const scoreDisplay = document.getElementById('score');
        const clicksDisplay = document.getElementById('clicks-count');
        const sessionDisplay = document.getElementById('session-mined');
        const cpsDisplay = document.getElementById('cps-value');

        // Параметры из ссылки
        const urlParams = new URLSearchParams(window.location.search);
        let initialValue = parseFloat(urlParams.get('balance')) || 0.00000;
        let currentScore = initialValue;
        let clicks = 0;
        let clickTimes = [];

        // Стартовое значение
        scoreDisplay.innerText = currentScore.toFixed(5);

        tg.expand();
        tg.ready();

        clicker.addEventListener('click', (e) => {
            const now = Date.now();
            clickTimes.push(now);

            currentScore += 0.01;
            clicks++;
            
            // Обновляем UI
            scoreDisplay.innerText = currentScore.toFixed(5);
            clicksDisplay.innerText = clicks;
            sessionDisplay.innerText = (currentScore - initialValue).toFixed(2);

            tg.HapticFeedback.impactOccurred('light');

            // Анимация вылетающей цифры
            const plus = document.createElement('div');
            plus.innerText = '+0.01';
            plus.className = 'plus-one';
            
            // Координаты клика
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            plus.style.left = x - 25 + 'px';
            plus.style.top = y - 30 + 'px';
            
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        });

        // Расчет скорости клика (CPS)
        setInterval(() => {
            const now = Date.now();
            // Оставляем клики только за последнюю 1 секунду
            clickTimes = clickTimes.filter(t => now - t < 1000);
            cpsDisplay.innerText = clickTimes.length.toFixed(1);
        }, 100);

        // Кнопка сохранения в Telegram
        tg.MainButton.setText("СОХРАНИТЬ ПРОГРЕСС");
        tg.MainButton.show();
        
        tg.MainButton.onClick(() => {
            const result = {
                diff: (currentScore - initialValue).toFixed(5),
                total: currentScore.toFixed(5),
                clicks: clicks
            };
            tg.sendData(JSON.stringify(result));
            tg.close();
        });
    </script>
</body>
</html>
