<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Frog Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container { text-align: center; }

        #score {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .hint {
            color: var(--hint);
            margin-bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .coin-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Эффект нажатия: картинка немного уменьшается */
        .coin-wrapper:active {
            transform: scale(0.9);
        }

        .coin {
            width: 250px; /* Размер можно подправить под дизайн в Figma */
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Чтобы клик шел на wrapper */
        }

        /* Анимация всплывающих цифр */
        .plus-one {
            position: absolute;
            color: #27ae60;
            font-weight: bold;
            font-size: 28px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="score">0</div>
        <div class="hint">монет добыто</div>
        
        <div class="coin-wrapper" id="clicker">
            <div class="coin">
                <img src="button.png" alt="Mining Button">
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const clicker = document.getElementById('clicker');
        const scoreDisplay = document.getElementById('score');
        
        let score = 0;

        tg.expand();
        tg.ready();

        clicker.addEventListener('click', (e) => {
            score++;
            scoreDisplay.innerText = score;

            // Вибрация
            tg.HapticFeedback.impactOccurred('light');

            // Создаем эффект +1 в месте клика
            const plus = document.createElement('div');
            plus.innerText = '+1';
            plus.className = 'plus-one';
            
            // Центрируем цифру относительно места клика
            plus.style.left = (e.clientX || e.touches[0].clientX) - 15 + 'px';
            plus.style.top = (e.clientY || e.touches[0].clientY) - 30 + 'px';
            
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        });

        // Кнопка сохранения
        tg.MainButton.setText("СОХРАНИТЬ ПРОГРЕСС");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({final_score: score}));
            tg.close();
        });
    </script>
</body>
</html>
